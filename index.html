<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Notes</title>
  <style>
    :root {
      --xp-blue: #0a246a;
      --xp-blue-light: #a6caf0;
      --xp-title-active: linear-gradient(to right, #0a246a, #a6caf0);
      --xp-gray: #d4d0c8;
      --xp-shadow: #808080;
      --xp-highlight: #ffffff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height:100vh;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      background:#008080;
      color:#000;
      overflow:hidden;
    }

    .desktop {
      height:100%;
      background:url('https://images.alphacoders.com/115/115346.jpg') center/cover no-repeat;
      position:relative;
      display:flex;
      flex-direction:column;
    }

    .window {
      position:absolute;
      top:60px;
      left:80px;
      width:860px;
      height:580px;
      background:var(--xp-gray);
      border:2px solid #000;
      box-shadow: 4px 4px 0 #fff, -2px -2px 0 #808080;
      display:flex;
      flex-direction:column;
      resize:both;
      overflow:hidden;
      min-width:420px;
      min-height:300px;
    }

    .title-bar {
      height:28px;
      background:var(--xp-title-active);
      color:white;
      font-weight:bold;
      display:flex;
      align-items:center;
      padding:0 8px;
      user-select:none;
      border-bottom:1px solid #000;
    }

    .title-bar-buttons {
      margin-left:auto;
      display:flex;
      gap:2px;
    }

    .btn-win {
      width:22px;
      height:20px;
      background:var(--xp-gray);
      border:1px solid #000;
      border-top-color:#fff;
      border-left-color:#fff;
      box-shadow:inset -1px -1px #000;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      cursor:default;
    }

    .btn-win:hover { background:#c0c0c0; }
    .btn-close {
      background:#c0c0c0 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="black" stroke-width="2"/><line x1="9" y1="1" x2="1" y2="9" stroke="black" stroke-width="2"/></svg>') center no-repeat;
    }

    .toolbar {
      height:32px;
      background:var(--xp-gray);
      border-bottom:1px solid #808080;
      display:flex;
      align-items:center;
      padding:0 4px;
      gap:6px;
      font-size:11px;
    }

    .main-area {
      flex:1;
      display:flex;
      overflow:hidden;
    }

    .sidebar {
      width:220px;
      background:white;
      border-right:1px solid #808080;
      overflow-y:auto;
      padding:4px;
    }

    .folder {
      padding:3px 6px;
      cursor:pointer;
      user-select:none;
      border-radius:3px;
    }

    .folder:hover      { background:#d0e8ff; }
    .folder.active     { background:#a6d0ff; font-weight:bold; }
    .folder::before    { content:"📁 "; margin-right:4px; }

    .note-list {
      flex:1;
      background:white;
      overflow-y:auto;
      padding:6px;
    }

    .note-item {
      padding:8px 10px;
      border-bottom:1px solid #eee;
      cursor:pointer;
      transition:background 0.12s;
    }

    .note-item:hover   { background:#f0f8ff; }
    .note-item.active  { background:#cce5ff; }

    .viewer-area {
      flex:2;
      background:#fff;
      display:flex;
      flex-direction:column;
      padding:12px;
      overflow:auto;
    }

    #note-title-display {
      font-size:16px;
      font-weight:bold;
      margin-bottom:12px;
      padding-bottom:8px;
      border-bottom:1px solid #ccc;
    }

    #note-content-display {
      white-space:pre-wrap;
      font-size:13px;
      line-height:1.5;
      font-family:"Tahoma", sans-serif;
    }

    .status-bar {
      height:22px;
      background:var(--xp-gray);
      border-top:1px solid #808080;
      font-size:11px;
      display:flex;
      align-items:center;
      padding:0 8px;
      color:#000;
    }
  </style>
</head>
<body>

<div class="desktop">
  <div class="window" id="mainWindow">

    <div class="title-bar">
      <span>Notes Viewer - Read Only</span>
      <div class="title-bar-buttons">
        <div class="btn-win">_</div>
        <div class="btn-win">□</div>
        <div class="btn-win btn-close">X</div>
      </div>
    </div>

    <div class="toolbar">
      File  Edit  View  Help
    </div>

    <div class="main-area">

      <div class="sidebar" id="folderList"></div>

      <div class="note-list" id="noteList"></div>

      <div class="viewer-area">
        <div id="note-title-display">Select a note</div>
        <div id="note-content-display">Nothing selected yet...</div>
      </div>

    </div>

    <div class="status-bar">
      <span id="status">Read-only mode | Select folder and note to view</span>
    </div>

  </div>
</div>

<script>
// ────────────────────────────────────────────────
//     ALL CONTENT LIVES HERE — edit only in code
// ────────────────────────────────────────────────
const folders = {
  "Home": [
    { id:1, title: "what is this?", content: "This is my magical page of magic, go view some of m,y files!", date:"2026-03-2" }
  ],
  "Silto Files": [
    { id:2, title: "Silto's secrets", content: "Silto has a thing for hitler", date:"2026-03-2" },
    { id:3, title: "Silto's secrets #2", content: "Silto loves autistic kids", date:"2026-03-2" },
    { id:4, title: "Silto's secrets #3", content: "Silto kinda likes to watch me fly into a burritor", date:"2026-03-2" },
    { id:5, title: "Silto's secrets  #4", content: "I love burritos", date:"2026-03-2" }
  ],
  "dreamalter Files": [
    { id:6, title: "dreamalter's secrets", content: "dreamalter has a thing for speedy (secretly)", date:"2026-03-2" },
    { id:7, title: "dreamalter's secrets #2", content: "dreamalter likes watching burrito bison gameplay", date:"2026-03-2" }
  ]
};

let currentFolder = "Home";
let currentNoteId = null;

// ────────────────────────────────────────────────
function renderFolders() {
  const container = document.getElementById("folderList");
  container.innerHTML = "";

  Object.keys(folders).forEach(name => {
    const div = document.createElement("div");
    div.className = "folder";
    if (name === currentFolder) div.classList.add("active");
    div.textContent = name;
    div.onclick = () => {
      currentFolder = name;
      currentNoteId = null;
      renderFolders();
      renderNotes();
      showNote(null);
    };
    container.appendChild(div);
  });
}

function renderNotes() {
  const container = document.getElementById("noteList");
  container.innerHTML = "";

  (folders[currentFolder] || []).forEach(note => {
    const div = document.createElement("div");
    div.className = "note-item";
    if (note.id === currentNoteId) div.classList.add("active");
    div.innerHTML = `<div>${note.title}</div><small>${note.date}</small>`;
    div.onclick = () => showNote(note.id);
    container.appendChild(div);
  });
}

function showNote(id) {
  currentNoteId = id;
  renderNotes();

  const titleEl   = document.getElementById("note-title-display");
  const contentEl = document.getElementById("note-content-display");

  if (!id) {
    titleEl.textContent = "Select a note";
    contentEl.textContent = "Nothing selected yet...";
    return;
  }

  let note = null;
  for (let f of Object.values(folders)) {
    note = f.find(n => n.id === id);
    if (note) break;
  }

  if (note) {
    titleEl.textContent   = note.title;
    contentEl.textContent = note.content;
    document.getElementById("status").textContent =
      `Viewing: ${note.title}  •  Last modified: ${note.date}`;
  }
}

// ────────────────────────────────────────────────
renderFolders();
renderNotes();
showNote(null);   // start with nothing selected

// Make window draggable
const titleBar = document.querySelector(".title-bar");
const windowEl = document.getElementById("mainWindow");

let isDragging = false;
let startX, startY;

titleBar.addEventListener("mousedown", e => {
  if (e.target.closest(".title-bar-buttons")) return;
  isDragging = true;
  startX = e.clientX - windowEl.offsetLeft;
  startY = e.clientY - windowEl.offsetTop;
});

document.addEventListener("mousemove", e => {
  if (!isDragging) return;
  windowEl.style.left = (e.clientX - startX) + "px";
  windowEl.style.top  = (e.clientY - startY) + "px";
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

</script>
</body>
</html>
